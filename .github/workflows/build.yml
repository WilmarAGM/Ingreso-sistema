name: Build ejecutables

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    if: contains(github.ref, '-linux') || (!contains(github.ref, '-win') && !contains(github.ref, '-mac'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        working-directory: empaquetado
        run: pip install pyinstaller && pip install -r requirements.txt
      - name: Construir
        working-directory: empaquetado
        run: pyinstaller --noconfirm app.spec
      - name: Subir a release
        uses: softprops/action-gh-release@v2
        with:
          files: empaquetado/dist/app

  build-windows:
    if: contains(github.ref, '-win')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        working-directory: empaquetado
        run: pip install pyinstaller && pip install -r requirements.txt
      - name: Construir
        working-directory: empaquetado
        run: pyinstaller --noconfirm app.spec
      - name: Subir a release
        uses: softprops/action-gh-release@v2
        with:
          files: empaquetado/dist/app.exe

  build-macos:
    if: contains(github.ref, '-mac')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        working-directory: empaquetado
        run: pip install pyinstaller && pip install -r requirements.txt
      - name: Construir
        working-directory: empaquetado
        run: pyinstaller --noconfirm app.spec
      - name: Subir a release
        uses: softprops/action-gh-release@v2
        with:
          files: empaquetado/dist/app
